name: Build Keyboard Firmware

on: [push, workflow_dispatch]

jobs:
  matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: set-matrix
        run: |
          if [ -f target.json ]; then
            echo "matrix=$(jq -c . target.json)" >> $GITHUB_OUTPUT
          else
            echo "matrix={\"include\":[]}" >> $GITHUB_OUTPUT
          fi

  build:
    needs: matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - name: Build Firmware
        uses: sekigon-gonnoc/qmk-build-action@main
        with:
          keyboard: ${{ matrix.keyboard }}
          keymap: ${{ matrix.keymap }}
          vial_id: ${{ matrix.vial_id }}
          layouts: ${{ matrix.layouts }}
          extraflags: ${{ matrix.extraflags }}
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.keyboard }}-${{ matrix.keymap }}
          path: |
            *.hex
            *.bin
            *.uf2
